name: Coverage

on:
  push:
    branches: [main, master, develop, 'feature/**']
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  # Minimum line-coverage threshold (%) enforced per crate.
  COVERAGE_THRESHOLD: 95

jobs:
  coverage:
    name: Per-crate coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + llvm-tools)
        run: |
          rustup toolchain install stable --profile minimal \
            --component llvm-tools-preview
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Coverage — credence_bond
        run: |
          cargo llvm-cov --package credence_bond \
            --lcov --output-path lcov-credence_bond.info
          lf=$(awk -F: '/^LF:/ {lf=$2} END {print lf+0}' lcov-credence_bond.info)
          lh=$(awk -F: '/^LH:/ {lh=$2} END {print lh+0}' lcov-credence_bond.info)
          if [ "$lf" -eq 0 ]; then
            echo "ERROR: invalid LCOV report, no lines found"
            exit 1
          fi
          percent=$(awk -v lh="$lh" -v lf="$lf" 'BEGIN {printf("%.6f", lh/lf*100)}')
          echo "Line coverage: $percent% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)"
          if awk -v percent="$percent" -v threshold="${{ env.COVERAGE_THRESHOLD }}" 'BEGIN {exit !(percent+0 >= threshold+0)}'; then
            echo "Coverage threshold met"
          else
            echo "Coverage threshold not met"
            exit 1
          fi

      - name: Coverage — credence_delegation
        run: |
          cargo llvm-cov --package credence_delegation \
            --lcov --output-path lcov-credence_delegation.info
          lf=$(awk -F: '/^LF:/ {lf=$2} END {print lf+0}' lcov-credence_delegation.info)
          lh=$(awk -F: '/^LH:/ {lh=$2} END {print lh+0}' lcov-credence_delegation.info)
          if [ "$lf" -eq 0 ]; then
            echo "ERROR: invalid LCOV report, no lines found"
            exit 1
          fi
          percent=$(awk -v lh="$lh" -v lf="$lf" 'BEGIN {printf("%.6f", lh/lf*100)}')
          echo "Line coverage: $percent% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)"
          if awk -v percent="$percent" -v threshold="${{ env.COVERAGE_THRESHOLD }}" 'BEGIN {exit !(percent+0 >= threshold+0)}'; then
            echo "Coverage threshold met"
          else
            echo "Coverage threshold not met"
            exit 1
          fi

      - name: Coverage — timelock
        run: |
          cargo llvm-cov --package timelock \
            --lcov --output-path lcov-timelock.info
          lf=$(awk -F: '/^LF:/ {lf=$2} END {print lf+0}' lcov-timelock.info)
          lh=$(awk -F: '/^LH:/ {lh=$2} END {print lh+0}' lcov-timelock.info)
          if [ "$lf" -eq 0 ]; then
            echo "ERROR: invalid LCOV report, no lines found"
            exit 1
          fi
          percent=$(awk -v lh="$lh" -v lf="$lf" 'BEGIN {printf("%.6f", lh/lf*100)}')
          echo "Line coverage: $percent% (threshold: ${{ env.COVERAGE_THRESHOLD }}%)"
          if awk -v percent="$percent" -v threshold="${{ env.COVERAGE_THRESHOLD }}" 'BEGIN {exit !(percent+0 >= threshold+0)}'; then
            echo "Coverage threshold met"
          else
            echo "Coverage threshold not met"
            exit 1
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: lcov-reports
          path: lcov-*.info
